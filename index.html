<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0F1C;
    --surface:rgba(255,255,255,0.045);
    --surface-solid:#131B2E;
    --surface-strong:#182240;
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.18);
    --text:#EAF0F7;
    --text-dim:#8C97AC;
    --text-faint:#5C6780;
    --accent:#22D3AA;
    --accent-2:#F2B84B;
    --accent-soft:rgba(34,211,170,0.13);
    --danger:#F0708A;
    --danger-soft:rgba(240,112,138,0.13);
    --glow-1: rgba(34,211,170,.16);
    --glow-2: rgba(242,184,75,.12);
    --glow-3: rgba(34,211,170,.07);
    --cal-filter: invert(.85);
  }
  body.light{
    --bg:#F3F5F9;
    --surface:rgba(16,24,40,0.045);
    --surface-solid:#FFFFFF;
    --surface-strong:#EEF1F7;
    --border:rgba(16,24,40,0.10);
    --border-strong:rgba(16,24,40,0.20);
    --text:#101828;
    --text-dim:#5C6780;
    --text-faint:#8C97AC;
    --accent:#0EA37F;
    --accent-2:#C98F2E;
    --accent-soft:rgba(14,163,127,0.10);
    --danger:#D94F6B;
    --danger-soft:rgba(217,79,107,0.10);
    --glow-1: rgba(14,163,127,.10);
    --glow-2: rgba(201,143,46,.09);
    --glow-3: rgba(14,163,127,.05);
    --cal-filter: invert(0);
  }
  *{ box-sizing:border-box; }
  html, body{ overflow-x:hidden; width:100%; max-width:100%; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0; min-height:100vh; background:var(--bg);
    background-image:
      radial-gradient(circle at 12% -6%, var(--glow-1), transparent 42%),
      radial-gradient(circle at 108% 14%, var(--glow-2), transparent 40%),
      radial-gradient(circle at 50% 100%, var(--glow-3), transparent 50%);
    background-attachment:fixed;
    font-family:'IBM Plex Sans Arabic', sans-serif;
    font-weight:500;
    color:var(--text);
    display:flex; justify-content:center;
    padding:26px 14px 60px;
    transition:background-color .2s ease, color .2s ease;
  }
  .app{ width:100%; max-width:560px; min-width:0; }
  .app-footer{ text-align:center; color:var(--text-faint); font-size:10.5px; font-weight:400; line-height:1.7; margin-top:18px; }
  .app-footer p{ margin:2px 0; }
  .app-footer .phone-number{ direction:ltr; unicode-bidi:embed; display:inline-block; }

  /* ---------- header ---------- */
  .topbar{ display:flex; align-items:center; gap:12px; padding:4px 4px 20px; }
  .logo-mark{
    width:44px; height:44px; border-radius:13px; flex:0 0 auto;
    background:linear-gradient(135deg, var(--accent), #1AA684 60%, var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:16px; color:#06251D;
    box-shadow:0 6px 20px rgba(34,211,170,.35);
  }
  .topbar .title-block{ flex:1; min-width:0; }
  .topbar h1{ font-size:21px; font-weight:700; margin:0; color:var(--text); letter-spacing:-.2px; }
  .topbar p{ font-size:12px; margin:2px 0 0; color:var(--text-dim); font-weight:500; }

  .top-controls{ display:flex; align-items:center; gap:6px; flex:0 0 auto; }
  .lang-toggle{
    display:flex; background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:3px; gap:2px;
  }
  .lang-toggle button{
    border:none; background:transparent; padding:6px 11px; border-radius:999px; font-family:'IBM Plex Mono',monospace;
    font-weight:600; font-size:11.5px; color:var(--text-dim); cursor:pointer; transition:all .15s ease;
  }
  .lang-toggle button.active{ background:linear-gradient(135deg, var(--accent), #1AA684); color:#052018; }
  .theme-toggle{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
    color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .theme-toggle:hover{ border-color:var(--border-strong); }

  /* ---------- search ---------- */
  .search-wrap{ position:relative; margin-bottom:16px; }
  .search-wrap input{
    width:100%; padding:13px 44px 13px 16px; border-radius:14px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-family:'IBM Plex Sans Arabic',sans-serif;
    font-weight:500; font-size:13.5px; outline:none; transition:border-color .15s, background .15s;
  }
  html[dir="ltr"] .search-wrap input{ padding:13px 16px 13px 44px; }
  .search-wrap input::placeholder{ color:var(--text-faint); }
  .search-wrap input:focus{ border-color:var(--accent); background:var(--surface-solid); }
  .search-wrap::after{
    content:"⌕"; position:absolute; left:16px; top:50%; transform:translateY(-50%) scaleX(-1);
    color:var(--text-faint); font-size:16px; pointer-events:none;
  }
  html[dir="ltr"] .search-wrap::after{ left:auto; right:16px; transform:translateY(-50%); }

  /* ---------- tabs ---------- */
  .tabs{ display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:16px; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    background:var(--surface); color:var(--text-dim); border:1px solid var(--border);
    border-radius:999px; padding:10px 16px; font-family:'IBM Plex Sans Arabic', sans-serif;
    font-weight:600; font-size:13px; cursor:pointer; transition:all .15s ease; white-space:nowrap;
  }
  .tab .ic{ font-size:14px; }
  .tab.active{
    background:linear-gradient(135deg, var(--accent), #1AA684); color:#052018; border-color:transparent;
    box-shadow:0 4px 14px rgba(34,211,170,.3);
  }
  .tab:not(.active):hover{ background:var(--surface-solid); color:var(--text); border-color:var(--border-strong); }
  .tab.hidden-tab{ display:none; }

  /* ---------- card ---------- */
  .card{
    background:linear-gradient(180deg, var(--surface-solid), var(--surface-strong));
    border:1px solid var(--border); border-radius:22px; padding:24px 20px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .section-title{ display:flex; align-items:center; gap:9px; font-size:17.5px; font-weight:700; margin:0 0 4px; color:var(--text); }
  .section-title .ic{ font-size:19px; }
  .section-sub{ font-size:12.5px; color:var(--text-dim); margin:0 0 20px; font-weight:400; line-height:1.6; }
  .disclaimer{ font-size:11px; color:var(--text-faint); font-weight:400; margin-top:12px; line-height:1.6; }

  /* ---------- mode / toggle controls ---------- */
  .mode-row{ display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .mode-btn{
    flex:1; min-width:90px; background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:10px 6px; font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:600; font-size:12.5px;
    color:var(--text-dim); cursor:pointer; transition:all .15s ease;
  }
  .mode-btn.active{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

  .toggle-row{ display:flex; gap:8px; margin-bottom:16px; background:var(--surface); padding:4px; border-radius:13px; border:1px solid var(--border); min-width:0; }
  .toggle-row button{ min-width:0; }
  .toggle-row button{
    flex:1; padding:9px 6px; border-radius:10px; border:none; background:transparent;
    font-family:'IBM Plex Sans Arabic',sans-serif; font-weight:600; font-size:12.5px; color:var(--text-dim); cursor:pointer;
  }
  .toggle-row button.active{ background:linear-gradient(135deg, var(--accent), #1AA684); color:#052018; }

  .chip-row{ display:flex; gap:7px; margin:-8px 0 16px; flex-wrap:wrap; }
  .chip{
    background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:6px 13px;
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--text-dim); cursor:pointer; font-weight:500;
  }
  .chip:hover{ background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }

  /* ---------- fields ---------- */
  .field{ margin-bottom:14px; }
  .field label{ display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:7px; }
  .field label .tag{ font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--accent); font-weight:500; }
  .field input, .field select{
    width:100%; padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:var(--surface-strong);
    font-family:'IBM Plex Mono', monospace; font-size:16px; color:var(--text); outline:none; transition:border-color .15s ease;
  }
  .field select{ font-family:'IBM Plex Sans Arabic',sans-serif; font-size:13.5px; font-weight:600; }
  .field input:focus, .field select:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(34,211,170,.15); }
  .field input:disabled{ background:repeating-linear-gradient(135deg, var(--surface-strong), var(--surface-strong) 6px, var(--surface) 6px, var(--surface) 12px); color:var(--text-faint); }
  .field input::-webkit-calendar-picker-indicator{ filter:var(--cal-filter); cursor:pointer; }
  .field input[type=date]{ font-family:'IBM Plex Sans Arabic',sans-serif; font-size:14px; }
  .field input[type=number]{ direction:ltr; text-align:right; }
  html[dir="ltr"] .field input[type=number]{ text-align:left; }

  .row2{ display:flex; gap:10px; min-width:0; } .row2 .field{ flex:1; min-width:0; }
  .row3{ display:flex; gap:10px; min-width:0; } .row3 .field{ flex:1; min-width:0; }

  /* ---------- result card ---------- */
  .result-card{
    margin-top:20px; background:var(--accent-soft); border:1px solid rgba(34,211,170,.35);
    border-radius:16px; padding:18px 18px 20px; position:relative;
  }
  .result-card .r-label{ font-size:11.5px; color:var(--text-dim); font-family:'IBM Plex Mono', monospace; font-weight:400; letter-spacing:.5px; }
  .result-card .r-value{
    font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:30px; margin-top:6px; word-break:break-all;
    background:linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  /* ---------- buttons ---------- */
  .btn-primary{
    width:100%; margin-top:16px; padding:14px; background:linear-gradient(135deg, var(--accent), #1AA684);
    color:#052018; border:none; border-radius:13px; font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700;
    font-size:14.5px; cursor:pointer; transition:filter .15s ease; box-shadow:0 8px 20px rgba(34,211,170,.25);
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:disabled{ opacity:.55; cursor:not-allowed; }
  .btn-secondary{
    width:100%; margin-top:10px; padding:11px; background:transparent; color:var(--accent); border:1px solid rgba(34,211,170,.4);
    border-radius:12px; font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:600; font-size:13px; cursor:pointer;
  }
  .btn-secondary:hover{ background:var(--accent-soft); }

  /* ---------- table ---------- */
  table{ width:100%; border-collapse:collapse; margin-top:16px; font-family:'IBM Plex Mono', monospace; font-size:12px; }
  thead th{
    background:var(--surface-strong); color:var(--text); font-family:'IBM Plex Sans Arabic', sans-serif; font-weight:700;
    font-size:11.5px; padding:10px 6px; text-align:center; position:sticky; top:0;
  }
  thead th:first-child{ border-radius:10px 0 0 0; }
  thead th:last-child{ border-radius:0 10px 0 0; }
  tbody td{ padding:9px 6px; text-align:center; border-bottom:1px solid var(--border); color:var(--text-dim); }
  tbody tr:nth-child(even){ background:rgba(127,127,127,.04); }
  .table-wrap{ max-height:320px; overflow-y:auto; overflow-x:auto; border-radius:0 0 10px 10px; border:1px solid var(--border); max-width:100%; }
  table{ min-width:100%; }
  .table-wrap::-webkit-scrollbar{ width:8px; }
  .table-wrap::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:8px; }

  /* ---------- summary grid ---------- */
  .summary-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px; }
  .summary-card{ background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--accent); border-radius:13px; padding:13px 12px; }
  .summary-card .s-label{ font-size:10.5px; color:var(--text-dim); margin-bottom:5px; font-weight:500; }
  .summary-card .s-value{ font-family:'IBM Plex Mono', monospace; font-weight:700; font-size:16px; color:var(--text); }
  .summary-card.alt{ border-top-color:var(--danger); }

  .error-msg{ color:var(--danger); font-size:12px; font-weight:600; margin-top:10px; padding:10px 12px; background:var(--danger-soft); border-radius:10px; display:none; }
  .info-msg{ color:var(--accent); font-size:12px; font-weight:600; margin-top:10px; padding:10px 12px; background:var(--accent-soft); border-radius:10px; display:none; }

  .divider-label{ font-size:13px; font-weight:700; margin:22px 0 10px; color:var(--text); display:flex; align-items:center; gap:8px; }
  .divider-label::after{ content:""; flex:1; height:1px; background:var(--border); }

  .footer-note{ text-align:center; color:var(--text-faint); font-size:11px; margin-top:18px; font-weight:400; }

  .spinner{ display:inline-block; width:14px; height:14px; border:2px solid rgba(5,32,24,.35); border-top-color:#052018; border-radius:50%; animation:spin .7s linear infinite; margin-inline-end:6px; vertical-align:middle; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- history ---------- */
  .history-btn{
    position:fixed; left:16px; bottom:16px; background:linear-gradient(135deg, var(--accent-2), #C98F2E); color:#2B1D02;
    border:none; border-radius:50%; width:52px; height:52px; font-size:19px; cursor:pointer;
    box-shadow:0 10px 26px rgba(242,184,75,.35); z-index:50;
  }
  .history-badge{
    position:fixed; left:52px; bottom:52px; background:var(--danger); color:#2B0410; font-family:'IBM Plex Mono', monospace;
    font-size:10px; font-weight:700; border-radius:50%; width:19px; height:19px; display:none; align-items:center; justify-content:center; z-index:51;
  }
  .modal-overlay{ position:fixed; inset:0; background:rgba(4,8,16,.7); backdrop-filter:blur(2px); display:none; align-items:flex-end; justify-content:center; z-index:100; }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:var(--surface-solid); border:1px solid var(--border); width:100%; max-width:560px; max-height:75vh; border-radius:20px 20px 0 0; padding:22px; overflow-y:auto; }
  .modal-box h2{ font-size:17px; margin:0 0 4px; color:var(--text); font-weight:700; }
  .modal-close{ float:left; background:var(--surface); border:1px solid var(--border); border-radius:50%; width:30px; height:30px; font-size:15px; cursor:pointer; color:var(--text); }
  .hist-item{ background:var(--surface); border:1px solid var(--border); border-right:3px solid var(--accent-2); border-radius:12px; padding:11px 13px; margin-top:10px; }
  html[dir="ltr"] .hist-item{ border-right:1px solid var(--border); border-left:3px solid var(--accent-2); }
  .hist-item .h-type{ font-size:10.5px; color:var(--accent-2); font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .hist-item .h-text{ font-size:12.5px; margin-top:4px; color:var(--text); }
  .hist-item .h-time{ font-size:10px; color:var(--text-faint); margin-top:4px; font-weight:400; }
  .clear-hist{ margin-top:16px; width:100%; padding:11px; background:var(--danger-soft); color:var(--danger); border:1px solid rgba(240,112,138,.35); border-radius:12px; font-family:'IBM Plex Sans Arabic',sans-serif; font-weight:700; cursor:pointer; }
  .empty-hist{ color:var(--text-faint); font-size:12px; margin-top:10px; font-weight:400; }

  @media (max-width:400px){
    .result-card .r-value{ font-size:24px; }
    .row2, .row3{ flex-direction:column; }
  }

  /* ---------- access gate ---------- */
  #gate-screen{ width:100%; max-width:420px; margin:60px auto 0; }
  .gate-card .field{ margin-bottom:16px; }
  #gate-error{ text-align:center; }
</style>
</head>
<body>

<div id="gate-screen">
  <div class="card gate-card">
    <div class="top-controls" style="justify-content:center; margin-bottom:14px;">
      <div class="lang-toggle">
        <button data-lang="ar" class="active">AR</button>
        <button data-lang="en">EN</button>
      </div>
      <button class="theme-toggle">🌙</button>
    </div>
    <div class="logo-mark" style="margin:0 auto 14px;">SC</div>
    <h2 style="text-align:center; font-size:19px; margin:0 0 4px;">Smart Calc</h2>
    <p class="section-sub" style="text-align:center;" data-i18n="gate_sub">دخول مخصص للمشتركين — اكتب اسمك والكود اللي معاك</p>
    <p class="info-msg" id="gate-loading" style="display:block; text-align:center;" data-i18n="gate_checking_session">جاري التحقق من جلستك...</p>
    <div id="gate-form" style="display:none;">
      <div class="field"><label data-i18n="gate_lbl_name">الاسم</label><input type="text" id="gate-name" placeholder="اسمك زي ما اتبعتلك" data-i18n-placeholder="gate_ph_name" autocomplete="off"></div>
      <div class="field"><label data-i18n="gate_lbl_code">كود الدخول</label><input type="text" id="gate-code" placeholder="الكود الخاص بيك" data-i18n-placeholder="gate_ph_code" autocomplete="off"></div>
      <button class="btn-primary" id="gate-submit" data-i18n="gate_btn_submit">دخول</button>
      <div class="error-msg" id="gate-error"></div>
      <p class="disclaimer" style="text-align:center;" data-i18n="gate_note">محتاج اتصال بالإنترنت وقت الدخول للتحقق من صلاحية اشتراكك.</p>
    </div>
    <div class="app-footer">
      <p data-i18n="copyright_line">جميع الحقوق محفوظة © Ahmed Abd-Elrahman - مصر - 2026</p>
      <p><span class="phone-number">+201069296992</span></p>
    </div>
  </div>
</div>

<div id="app-content" style="display:none;">
<button class="history-btn" id="history-open">📜</button>
<div class="history-badge" id="history-badge">0</div>

<div class="modal-overlay" id="history-modal">
  <div class="modal-box">
    <button class="modal-close" id="history-close">✕</button>
    <h2 data-i18n="history_title">سجل العمليات</h2>
    <div id="history-list"></div>
    <button class="clear-hist" id="history-clear" data-i18n="history_clear">امسح السجل</button>
  </div>
</div>

<div class="app">
  <div class="topbar">
    <div class="logo-mark">SC</div>
    <div class="title-block">
      <h1>Smart Calc</h1>
      <p data-i18n="h_tagline">كل أدواتك المالية في مكان واحد</p>
      <p id="sub-expiry-badge" style="display:none; font-size:10px; color:var(--accent); margin-top:3px; font-weight:600;"></p>
    </div>
    <div class="top-controls">
      <div class="lang-toggle">
        <button data-lang="ar" class="active">AR</button>
        <button data-lang="en">EN</button>
      </div>
      <button class="theme-toggle">🌙</button>
    </div>
  </div>

  <div class="search-wrap">
    <input type="text" id="tool-search" placeholder="دور على أداة... مثلاً: قروض، عملات، زكاة" data-i18n-placeholder="search_ph">
  </div>

  <div class="tabs" id="tabs-container">
    <button class="tab active" data-tab="pct"><span class="ic">🧮</span><span data-i18n="tab_pct">النسبة المئوية</span></button>
    <button class="tab" data-tab="comp"><span class="ic">📈</span><span data-i18n="tab_comp">النسبة التراكمية</span></button>
    <button class="tab" data-tab="grow"><span class="ic">💹</span><span data-i18n="tab_grow">الاستثمار والادخار</span></button>
    <button class="tab" data-tab="pricing"><span class="ic">🏷️</span><span data-i18n="tab_pricing">الأسعار والنسب</span></button>
    <button class="tab" data-tab="zakat"><span class="ic">🕌</span><span data-i18n="tab_zakat">الزكاة</span></button>
    <button class="tab" data-tab="loan"><span class="ic">🏦</span><span data-i18n="tab_loan">القروض والأقساط</span></button>
    <button class="tab" data-tab="currency"><span class="ic">💱</span><span data-i18n="tab_currency">تحويل العملات</span></button>
    <button class=
